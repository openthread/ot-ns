name: Develop

on:
  push:
    branches-ignore:
      - 'dependabot/**'
  pull_request:
    branches:
      - 'main'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || (github.repository == 'openthread/ot-ns' && github.run_id) || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  develop:
    name: Develop (Go${{ matrix.go }}, Python${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    env:
      HOMEBREW_NO_AUTO_UPDATE: 1
    strategy:
      fail-fast: false
      matrix:
        go: ['1.23']
        python-version: ['3.10']
        os: [ubuntu-22.04, ubuntu-24.04]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ matrix.go }}
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: Buildx Docker 'environment'
        run: |
          ./script/docker-build environment
      - name: Build OTNS Web
        run: |
          ./script/install-deps
          ./script/run-docker-pack-web
          if ! git diff --quiet; then
            echo "script/pack-web was not properly executed:"
            git diff
            exit 1
          fi
          ./script/install
      - name: Build custom OT node
        run: |
          cd ot-rfsim
          ./script/build -DOT_HISTORY_TRACKER=ON
      - name: Setup dev environment
        run: |
          ./script/setup-dev
